name = "undercover-server"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Tunable caps — keep cost/room count under control.
[vars]
MAX_ROOMS = "20"
MAX_PLAYERS_PER_ROOM = "12"
ROOM_IDLE_TIMEOUT_MS = "1800000"  # 30 minutes

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "Registry"

# SQLite-backed classes are required for Durable Objects on the free plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room", "Registry"]
